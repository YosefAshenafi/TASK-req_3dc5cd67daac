# SmartPark Media Operations - local-first dev/prod stack
# All services run on the parking-site LAN. No internet egress required.
# Start: docker compose up -d
# Stop:  docker compose down

services:
  mysql:
    image: mysql:8.0
    container_name: smartpark-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: smartpark
      MYSQL_USER: smartpark
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-smartpark_dev}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_dev}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root_dev}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [smartpark-lan]

  redis:
    image: redis:7-alpine
    container_name: smartpark-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [smartpark-lan]

  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: smartpark-backend
    restart: unless-stopped
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      APP_ENV: ${APP_ENV:-local}
      # Must decode to 32 bytes for AES-256-CBC (see phpunit.xml APP_KEY for tests)
      APP_KEY: ${APP_KEY:-base64:QUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUE=}
      APP_DEBUG: ${APP_DEBUG:-true}
      DB_HOST: mysql
      DB_DATABASE: smartpark
      DB_USERNAME: smartpark
      DB_PASSWORD: ${MYSQL_PASSWORD:-smartpark_dev}
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      FIELD_ENCRYPTION_KEY_PATH: /run/secrets/field_key
      GATEWAY_TOKEN: ${GATEWAY_TOKEN:-change-me-local-gateway-token}
    volumes:
      - ./backend:/var/www/html
      - media-storage:/var/www/html/storage/app/media
    secrets:
      - field_key
    healthcheck:
      test: ["CMD", "test", "-f", "/var/www/html/vendor/autoload.php"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 180s
    networks: [smartpark-lan]

  queue-worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: smartpark-queue
    restart: unless-stopped
    depends_on:
      backend: { condition: service_healthy }
    command: ["php", "artisan", "horizon"]
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY:-base64:QUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUE=}
      APP_DEBUG: ${APP_DEBUG:-true}
      DB_HOST: mysql
      DB_DATABASE: smartpark
      DB_USERNAME: smartpark
      DB_PASSWORD: ${MYSQL_PASSWORD:-smartpark_dev}
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      FIELD_ENCRYPTION_KEY_PATH: /run/secrets/field_key
    volumes:
      - ./backend:/var/www/html
      - media-storage:/var/www/html/storage/app/media
    secrets:
      - field_key
    networks: [smartpark-lan]

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: smartpark-scheduler
    restart: unless-stopped
    depends_on:
      backend: { condition: service_healthy }
    command: ["php", "artisan", "schedule:work"]
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY:-base64:QUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUE=}
      APP_DEBUG: ${APP_DEBUG:-true}
      DB_HOST: mysql
      DB_DATABASE: smartpark
      DB_USERNAME: smartpark
      DB_PASSWORD: ${MYSQL_PASSWORD:-smartpark_dev}
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      FIELD_ENCRYPTION_KEY_PATH: /run/secrets/field_key
    volumes:
      - ./backend:/var/www/html
      - media-storage:/var/www/html/storage/app/media
    secrets:
      - field_key
    networks: [smartpark-lan]

  nginx:
    image: nginx:1.25-alpine
    container_name: smartpark-nginx
    restart: unless-stopped
    depends_on:
      backend: { condition: service_started }
    ports:
      - "8090:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/public:/var/www/html/public:ro
      - ./frontend/dist:/var/www/html/spa:ro
    networks: [smartpark-lan]

  frontend-dev:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: smartpark-frontend-dev
    profiles: ["dev"]
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8090
    networks: [smartpark-lan]

  gateway:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: smartpark-gateway
    restart: unless-stopped
    profiles: ["devices"]
    depends_on:
      backend: { condition: service_started }
    command: ["php", "artisan", "gateway:run"]
    environment:
      GATEWAY_API_URL: http://nginx/api
      GATEWAY_BUFFER_PATH: /var/spool/smartpark/buffer.sqlite
      GATEWAY_MAX_BUFFER: "10000"
      GATEWAY_TOKEN: ${GATEWAY_TOKEN:-change-me-local-gateway-token}
    volumes:
      - gateway-buffer:/var/spool/smartpark
      - ./device-gateway/inbox:/var/spool/smartpark/inbox
    networks: [smartpark-lan]

  test-runner:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: smartpark-test-runner
    profiles: ["test"]
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      APP_ENV: testing
      APP_KEY: ${APP_KEY:-base64:QUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUE=}
      DB_HOST: mysql
      DB_DATABASE: smartpark_test
      DB_USERNAME: smartpark
      DB_PASSWORD: ${MYSQL_PASSWORD:-smartpark_dev}
      REDIS_HOST: redis
      QUEUE_CONNECTION: sync
      CACHE_STORE: array
      SESSION_DRIVER: array
      GATEWAY_TOKEN: ${GATEWAY_TOKEN:-change-me-local-gateway-token}
    volumes:
      - ./backend:/var/www/html
      - ./api-tests:/tests/api
      - ./unit-tests:/tests/unit
    networks: [smartpark-lan]

  vitest-runner:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: smartpark-vitest-runner
    profiles: ["test"]
    working_dir: /app
    # Named volume may start empty: install deps before Vitest. CI=1 avoids TTY/watch quirks.
    command:
      [
        "sh",
        "-c",
        "set -e; npm ci; exec npm run test:unit:ci",
      ]
    environment:
      CI: "1"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    networks: [smartpark-lan]

  # Production build written to ./frontend/dist — nginx mounts this for E2E against http://nginx
  frontend-build:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: smartpark-frontend-build
    profiles: ["test"]
    working_dir: /app
    # Install devDependencies (npm-run-all2 / run-p) then build for production
    command: ["sh", "-c", "set -e; npm ci; NODE_ENV=production exec npm run build"]
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    networks: [smartpark-lan]

  e2e-runner:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: smartpark-e2e-runner
    profiles: ["test"]
    depends_on:
      nginx: { condition: service_started }
    command:
      [
        "sh",
        "-c",
        "set -e; npm ci; exec npx playwright test --project=desktop",
      ]
    environment:
      PLAYWRIGHT_BASE_URL: http://nginx
      # API lives behind the same nginx reverse proxy as the SPA (not localhost:8090)
      PLAYWRIGHT_API_BASE_URL: http://nginx
      CI: "1"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    networks: [smartpark-lan]

volumes:
  mysql-data:
  redis-data:
  media-storage:
  gateway-buffer:
  frontend-node-modules:

secrets:
  field_key:
    file: ./docker/secrets/field_encryption.key

networks:
  smartpark-lan:
    driver: bridge
