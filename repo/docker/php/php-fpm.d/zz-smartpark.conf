; Default php:fpm image uses error_log=/proc/self/fd/2 and access.log=/proc/self/fd/2.
; After su-exec to www, opening those fds can fail with "Permission denied" on some
; hosts (Docker Desktop, older runc). Log to files instead so FPM stays healthy.
[global]
error_log = /var/log/php-fpm.log

[www]
access.log = /var/log/php-fpm-access.log
